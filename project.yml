name: Claro
options:
  bundleIdPrefix: com.samueleskenasy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.samueleskenasy.claro
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "2X955T7VJ9"
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_PREVIEWS: "YES"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  Claro:
    type: application
    platform: iOS
    sources:
      - path: Claro
        excludes:
          - "**/*.md"
    resources:
      - path: Claro/Resources
        excludes:
          - "**/*.md"
    info:
      path: Claro/Resources/Info.plist
      properties:
        CFBundleName: Claro
        CFBundleDisplayName: Claro
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSPhotoLibraryUsageDescription: "Claro needs access to your photos to find and remove duplicates, freeing up valuable storage space."
        NSPhotoLibraryAddUsageDescription: "Claro needs permission to save optimized photos back to your library."
        NSContactsUsageDescription: "Claro needs access to your contacts to detect and merge duplicates."
        NSFaceIDUsageDescription: "Claro uses Face ID to protect your Private Vault."
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - "$(GMAIL_REDIRECT_SCHEME)"   # Set to com.googleusercontent.apps.YOUR_CLIENT_ID in Xcode build settings
